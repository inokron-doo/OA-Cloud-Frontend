# Reverse proxy + static SPA server for the Inokron frontend.
#
# Served from this one origin (port 80):
#   /     -> the built Vite SPA (with client-side routing fallback)
#   /api/ -> the Inokron backend  (Bearer-token JSON API)  [upstream: backend:8080]
#
# The OpenAGRI farm-calendar is intentionally NOT proxied here: the stock image
# does not support a path prefix (STATIC_URL is hardcoded to /static/, no
# FORCE_SCRIPT_NAME). It is reached directly at http://<host>:8002. Because that
# shares the SPA's hostname it is the SAME SITE, so the OpenAgriAuth SSO cookie
# still works in the embedded iframe without forking the calendar.

server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS so the backend upstream is resolved at request
    # time (via the $backend variable below), not at startup. This lets nginx
    # boot even if the backend isn't up yet, and re-resolves if its IP changes
    # on restart — avoiding "host not found in upstream" and stale-IP 502s.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend http://backend:8080;

    # Don't cache the runtime config or the service worker — they must reflect
    # the current deployment / build immediately.
    location = /config.js {
        add_header Cache-Control "no-store";
        root /usr/share/nginx/html;
    }
    location = /sw.js {
        add_header Cache-Control "no-store";
        root /usr/share/nginx/html;
    }

    # ---- Backend JSON API -------------------------------------------------
    # $request_uri preserves the full original path+query (the upstream keeps the
    # /api prefix). Using the $backend variable forces runtime DNS resolution.
    location /api/ {
        proxy_pass $backend$request_uri;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---- Static SPA -------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # gzip text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
